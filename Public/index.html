<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Suggestions Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Login Styles */
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .login-box {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }

        .login-box h2 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .error-message {
            color: #e74c3c;
            text-align: center;
            margin-top: 10px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        /* Dashboard Styles */
        .dashboard {
            display: none;
        }

        .dashboard.active {
            display: block;
        }

        .header {
            background: white;
            padding: 20px 30px;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #333;
            font-size: 24px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-info {
            color: #666;
        }

        .logout-btn {
            padding: 8px 20px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
        }

        .logout-btn:hover {
            background: #c0392b;
        }

        /* Statistics Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            text-align: center;
        }

        .stat-card h3 {
            color: #666;
            font-size: 14px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .stat-card .stat-number {
            font-size: 36px;
            font-weight: bold;
            color: #667eea;
        }

        /* Filters */
        .filters {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .filters select, .filters input {
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 14px;
            flex: 1;
            min-width: 150px;
        }

        /* Suggestions List */
        .suggestions-list {
            background: white;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .suggestion-item {
            padding: 20px;
            border-bottom: 1px solid #f0f0f0;
            transition: background-color 0.3s;
        }

        .suggestion-item:hover {
            background-color: #f9f9f9;
        }

        .suggestion-item:last-child {
            border-bottom: none;
        }

        .suggestion-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .suggestion-meta {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        .badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-unread {
            background: #ffeaa7;
            color: #d68910;
        }

        .badge-read {
            background: #81ecec;
            color: #00b894;
        }

        .badge-archived {
            background: #dfe6e9;
            color: #636e72;
        }

        .badge-responded {
            background: #a8e6cf;
            color: #00b894;
        }

        .suggestion-message {
            color: #555;
            line-height: 1.6;
            margin: 10px 0;
        }

        .suggestion-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .action-btn {
            padding: 6px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: transform 0.2s;
        }

        .action-btn:hover {
            transform: translateY(-1px);
        }

        .btn-mark-read {
            background: #74b9ff;
            color: white;
        }

        .btn-archive {
            background: #636e72;
            color: white;
        }

        .btn-delete {
            background: #e74c3c;
            color: white;
        }

        .no-suggestions {
            text-align: center;
            padding: 50px;
            color: #999;
            font-size: 18px;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: #999;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 15px;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .filters {
                flex-direction: column;
            }

            .suggestion-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <!-- Login Page -->
    <div id="loginPage" class="login-container">
        <div class="login-box">
            <h2>🔐 Admin Login</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" required placeholder="Enter username">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="Enter password">
                </div>
                <button type="submit" class="btn">Login</button>
                <div id="loginError" class="error-message"></div>
            </form>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" class="dashboard">
        <div class="container">
            <div class="header">
                <h1>📋 Suggestions Manager</h1>
                <div class="header-right">
                    <span class="user-info" id="userInfo"></span>
                    <button class="logout-btn" onclick="logout()">Logout</button>
                </div>
            </div>

            <!-- Statistics -->
            <div class="stats-grid" id="statsGrid">
                <div class="stat-card">
                    <h3>Total</h3>
                    <div class="stat-number" id="statTotal">0</div>
                </div>
                <div class="stat-card">
                    <h3>Unread</h3>
                    <div class="stat-number" id="statUnread">0</div>
                </div>
                <div class="stat-card">
                    <h3>Read</h3>
                    <div class="stat-number" id="statRead">0</div>
                </div>
                <div class="stat-card">
                    <h3>Archived</h3>
                    <div class="stat-number" id="statArchived">0</div>
                </div>
            </div>

            <!-- Filters -->
            <div class="filters">
                <select id="filterStatus" onchange="loadSuggestions()">
                    <option value="">All Status</option>
                    <option value="unread">Unread</option>
                    <option value="read">Read</option>
                    <option value="archived">Archived</option>
                    <option value="responded">Responded</option>
                </select>
                <select id="filterCategory" onchange="loadSuggestions()">
                    <option value="">All Categories</option>
                    <option value="General">General</option>
                    <option value="Bug Report">Bug Report</option>
                    <option value="Feature Request">Feature Request</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <!-- Suggestions List -->
            <div class="suggestions-list" id="suggestionsList">
                <div class="loading">Loading suggestions...</div>
            </div>
        </div>
    </div>

    <script>
        // API Base URL
        const API_BASE = window.location.origin;

        // Check authentication on page load
        document.addEventListener('DOMContentLoaded', async () => {
            const isAuth = await checkAuth();
            if (isAuth) {
                showDashboard();
            }
        });

        // Login form handler
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('loginError');
            
            try {
                const response = await fetch(`${API_BASE}/api/admin/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    credentials: 'include',
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    showDashboard();
                } else {
                    errorDiv.textContent = data.error || 'Login failed';
                    errorDiv.classList.add('show');
                }
            } catch (error) {
                errorDiv.textContent = 'Network error. Please try again.';
                errorDiv.classList.add('show');
            }
        });

        // Check authentication status
        async function checkAuth() {
            try {
                const response = await fetch(`${API_BASE}/api/admin/check-auth`, {
                    credentials: 'include'
                });
                const data = await response.json();
                return data.isAuthenticated;
            } catch (error) {
                return false;
            }
        }

        // Show dashboard
        async function showDashboard() {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('dashboard').classList.add('active');
            
            // Load user info
            const response = await fetch(`${API_BASE}/api/admin/check-auth`, {
                credentials: 'include'
            });
            const data = await response.json();
            document.getElementById('userInfo').textContent = `Welcome, ${data.username}`;
            
            loadStatistics();
            loadSuggestions();
        }

        // Load statistics
        async function loadStatistics() {
            try {
                const response = await fetch(`${API_BASE}/api/admin/statistics`, {
                    credentials: 'include'
                });
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('statTotal').textContent = data.statistics.total;
                    document.getElementById('statUnread').textContent = data.statistics.unread;
                    document.getElementById('statRead').textContent = data.statistics.read;
                    document.getElementById('statArchived').textContent = data.statistics.archived;
                }
            } catch (error) {
                console.error('Error loading statistics:', error);
            }
        }

        // Load suggestions
        async function loadSuggestions() {
            const suggestionsList = document.getElementById('suggestionsList');
            suggestionsList.innerHTML = '<div class="loading">Loading suggestions...</div>';
            
            const status = document.getElementById('filterStatus').value;
            const category = document.getElementById('filterCategory').value;
            
            try {
                const params = new URLSearchParams();
                if (status) params.append('status', status);
                if (category) params.append('category', category);
                
                const response = await fetch(`${API_BASE}/api/admin/suggestions?${params}`, {
                    credentials: 'include'
                });
                
                if (response.status === 401) {
                    logout();
                    return;
                }
                
                const data = await response.json();
                
                if (data.success && data.suggestions.length > 0) {
                    suggestionsList.innerHTML = data.suggestions.map(suggestion => `
                        <div class="suggestion-item">
                            <div class="suggestion-header">
                                <strong>${escapeHtml(suggestion.name)}</strong>
                                <div class="suggestion-meta">
                                    <span class="badge badge-${suggestion.status}">${suggestion.status}</span>
                                    <span class="badge" style="background: #dfe6e9;">${suggestion.category}</span>
                                    <small style="color: #999;">${new Date(suggestion.createdAt).toLocaleString()}</small>
                                </div>
                            </div>
                            <div class="suggestion-message">
                                ${escapeHtml(suggestion.message)}
                            </div>
                            <small style="color: #999;">Email: ${escapeHtml(suggestion.email)}</small>
                            <div class="suggestion-actions">
                                ${suggestion.status === 'unread' ? 
                                    `<button class="action-btn btn-mark-read" onclick="updateStatus('${suggestion.id}', 'read')">Mark as Read</button>` : ''}
                                ${suggestion.status !== 'archived' ? 
                                    `<button class="action-btn btn-archive" onclick="updateStatus('${suggestion.id}', 'archived')">Archive</button>` : ''}
                                <button class="action-btn btn-delete" onclick="deleteSuggestion('${suggestion.id}')">Delete</button>
                            </div>
                        </div>
                    `).join('');
                } else {
                    suggestionsList.innerHTML = '<div class="no-suggestions">No suggestions found 📭</div>';
                }
            } catch (error) {
                console.error('Error loading suggestions:', error);
                suggestionsList.innerHTML = '<div class="no-suggestions">Error loading suggestions</div>';
            }
        }

        // Update suggestion status
        async function updateStatus(id, status) {
            try {
                const response = await fetch(`${API_BASE}/api/admin/suggestions/${id}`, {
                    method: 'PATCH',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    credentials: 'include',
                    body: JSON.stringify({ status })
                });
                
                if (response.ok) {
                    loadSuggestions();
                    loadStatistics();
                }
            } catch (error) {
                console.error('Error updating status:', error);
                alert('Error updating suggestion');
            }
        }

        // Delete suggestion
        async function deleteSuggestion(id) {
            if (!confirm('Are you sure you want to delete this suggestion?')) {
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/api/admin/suggestions/${id}`, {
                    method: 'DELETE',
                    credentials: 'include'
                });
                
                if (response.ok) {
                    loadSuggestions();
                    loadStatistics();
                }
            } catch (error) {
                console.error('Error deleting suggestion:', error);
                alert('Error deleting suggestion');
            }
        }

        // Logout
        async function logout() {
            try {
                await fetch(`${API_BASE}/api/admin/logout`, {
                    method: 'POST',
                    credentials: 'include'
                });
            } catch (error) {
                console.error('Logout error:', error);
            }
            
            document.getElementById('dashboard').classList.remove('active');
            document.getElementById('loginPage').style.display = 'flex';
            document.getElementById('loginForm').reset();
            document.getElementById('loginError').classList.remove('show');
        }

        // Helper function to escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
  </html>
